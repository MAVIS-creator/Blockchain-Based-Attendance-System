# Nginx server block configuration for Blockchain-Based-Attendance-System
# This snippet handles custom error pages, security headers, and PHP routing.
# Adjust server_name, root path, and SSL paths to match your hosting environment.

server {
    listen 80;
    listen [::]:80;
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    
    server_name smart-attendance-samex.me;  # Update to your domain
    
    # SSL certificates (uncomment and update paths after enabling HTTPS)
    # ssl_certificate /path/to/your/certificate.crt;
    # ssl_certificate_key /path/to/your/private.key;
    
    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # if ($scheme != "https") {
    #     return 301 https://$server_name$request_uri;
    # }
    
    root /home/site/wwwroot;  # Azure Linux App Service document root
    index index.php index.html index.htm;
    
    # ===== Custom Error Pages (Azure Linux) =====
    error_page 400 /400.php;
    error_page 401 /401.php;
    error_page 403 /403.php;
    error_page 404 /404.php;
    error_page 405 /405.php;
    error_page 408 /408.php;
    error_page 429 /429.php;
    error_page 500 /500.php;
    error_page 502 /502.php;
    error_page 503 /503.php;
    error_page 504 /504.php;
    
    # Prevent direct access to error pages
    location = /400.php { internal; }
    location = /401.php { internal; }
    location = /403.php { internal; }
    location = /404.php { internal; }
    location = /405.php { internal; }
    location = /408.php { internal; }
    location = /429.php { internal; }
    location = /500.php { internal; }
    location = /502.php { internal; }
    location = /503.php { internal; }
    location = /504.php { internal; }
    
    # ===== Security Headers =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # ===== Deny Directory Browsing =====
    location / {
        try_files $uri $uri/ =404;
    }
    
    # ===== Protect Sensitive Files =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /\.(env\.local|settings_key|sessions\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Protect sensitive JSON files
    location ~ ~* \.(accounts|settings|settings_templates|chat|revoked|support_tickets)\.json$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Protect log and backup files
    location ~ \.(log|bak|lock|ps1|bat|md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ===== Protect storage directory =====
    location ^~ /storage/ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ===== Deny vendor directory direct access =====
    location ^~ /vendor/ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ===== PHP Handling =====
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;  # Update to your PHP-FPM socket if using Unix socket
        # fastcgi_pass unix:/run/php-fpm.sock;  # Uncomment for Unix socket
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "auto_prepend_file=$document_root/request_timing_auto.php";
        include fastcgi_params;
        
        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }
    
    # ===== Static Assets Cache =====
    location ~ \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # ===== Logging =====
    access_log /var/log/nginx/attendance_access.log;
    error_log /var/log/nginx/attendance_error.log warn;
}

# Optional: HTTP to HTTPS redirect (remove the "if" block above if adding this)
