; .user.ini - Per-directory PHP configuration for Azure App Service
; This file is read by PHP-FPM and takes priority over pool-level php.ini values.
; It fixes a critical session issue where Azure workers each have their own /tmp,
; causing sessions written by one worker to be invisible to others.

; Use persistent shared storage for sessions so all workers share the same pool.
; Azure App Service exposes /home as persistent shared storage across all instances.
session.save_path = /home/data/attendance_sessions

; Ensure a reasonable session lifetime (120 minutes = 7200 seconds).
session.gc_maxlifetime = 7200

; Strict mode prevents session ID hijacking.
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

; Garbage collection probability - run gc every ~100 requests to clean old sessions
session.gc_probability = 1
session.gc_divisor = 100
