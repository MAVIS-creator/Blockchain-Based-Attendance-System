# Nginx server block configuration for Blockchain-Based-Attendance-System
# Configured for Azure Linux App Service with automatic error page handling
# Domain: smart-attendance-samex.me

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name smart-attendance-samex.me;

    root /home/site/wwwroot;
    index index.php index.html index.htm;
    autoindex off;

    # ===== Custom Error Pages =====
    error_page 400 /400.php;
    error_page 401 /401.php;
    error_page 403 /403.php;
    error_page 404 /404.php;
    error_page 405 /405.php;
    error_page 408 /408.php;
    error_page 429 /429.php;
    error_page 500 /500.php;
    error_page 502 /502.php;
    error_page 503 /503.php;
    error_page 504 /504.php;

    # ===== Error Pages (allow Worker to fetch, block direct user access) =====
    location ~ ^/(40[0-9]|429|50[0-4])\.php$ {
        # Allow fetch from Cloudflare Worker (via X-Forwarded-For header check)
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Set header to indicate error page (for logging/debugging)
        add_header X-Error-Page "true" always;
    }

    # ===== Security Headers =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ===== Deny Directory Browsing =====
    location / {
        try_files $uri $uri/ =404;
    }

    # ===== Protect Sensitive Files =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.(env\.local|settings_key|sessions\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Protect sensitive JSON files
    location ~* (^|/)(accounts|settings|settings_templates|chat|revoked|support_tickets)\.json$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Protect log and backup files
    location ~ \.(log|bak|lock|ps1|bat|md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== Protect storage directory =====
    location ^~ /storage/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== Deny vendor directory direct access =====
    location ^~ /vendor/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== PHP Handling =====
    location ~ \.php$ {
        try_files $uri =404;
        # Try Unix socket first (Azure App Service standard), fall back to TCP
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "auto_prepend_file=$document_root/request_timing_auto.php";
        # Force session.save_path to persistent shared storage on Azure.
        # PHP_ADMIN_VALUE sets php_admin_value which is PHP_INI_SYSTEM level and
        # cannot be overridden by ini_set(), .user.ini, or per-dir .htaccess.
        fastcgi_param PHP_ADMIN_VALUE "session.save_path=/home/data/attendance_sessions";
        include fastcgi_params;

        # Timeouts
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
    }

    # ===== Static Assets Cache =====
    location ~ \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===== Logging =====
    access_log /var/log/nginx/attendance_access.log;
    error_log /var/log/nginx/attendance_error.log warn;
}
